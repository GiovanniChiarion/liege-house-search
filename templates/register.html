<!DOCTYPE html>
<html lang="it" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Liège House Search - Registrazione</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body {
            background: #0a0a1a;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }
        .login-card {
            background: #16162a;
            border: 1px solid #2a2a4a;
            border-radius: 16px;
            padding: 2.5rem;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
        }
        .login-card h2 {
            color: #e0e0e0;
            text-align: center;
            margin-bottom: 0.5rem;
        }
        .login-card p.sub {
            color: #888;
            text-align: center;
            font-size: 0.9rem;
            margin-bottom: 1.5rem;
        }
        .form-control {
            background: #0f0f1f;
            border: 1px solid #2a2a4a;
            color: #e0e0e0;
        }
        .form-control:focus {
            background: #0f0f1f;
            border-color: #6c63ff;
            box-shadow: 0 0 0 2px rgba(108,99,255,0.2);
            color: #e0e0e0;
        }
        .btn-accent {
            background: linear-gradient(135deg, #6c63ff, #5a52d5);
            border: none;
            color: white;
            width: 100%;
            padding: 0.6rem;
        }
        .btn-accent:hover {
            background: linear-gradient(135deg, #7c73ff, #6a62e5);
            color: white;
        }
        .logo { text-align: center; font-size: 2.5rem; margin-bottom: 0.5rem; }
        .flash-msg {
            padding: 0.5rem 1rem;
            border-radius: 8px;
            margin-bottom: 1rem;
            font-size: 0.85rem;
            text-align: center;
        }
        .flash-success { background: #1a3a2a; color: #4cdf8b; border: 1px solid #2a5a3a; }
        .flash-error { background: #3a1a1a; color: #ff6b6b; border: 1px solid #5a2a2a; }
        .flash-info { background: #1a2a3a; color: #6bb5ff; border: 1px solid #2a4a5a; }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="logo">🏠</div>
        <h2>Crea un account</h2>
        <p class="sub">Registrati per accedere a Liège House Search</p>

        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="flash-msg flash-{{ category }}">{{ message }}</div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        <form method="POST">
            <div class="mb-3">
                <label class="form-label small text-muted">Nome (opzionale)</label>
                <input type="text" class="form-control" name="name" placeholder="Il tuo nome">
            </div>
            <div class="mb-3">
                <label class="form-label small text-muted">Email</label>
                <input type="email" class="form-control" name="email" required placeholder="tua@email.com">
            </div>
            <div class="mb-3">
                <label class="form-label small text-muted">Password</label>
                <input type="password" class="form-control" name="password" required placeholder="min 4 caratteri">
            </div>
            <button type="submit" class="btn btn-accent mb-3">Registrati</button>
            <p class="text-center small text-muted mb-0">
                Hai già un account? <a href="{{ url_for('login') }}" style="color:#6c63ff;">Accedi</a>
            </p>
        </form>
    </div>
</body>
</html>
